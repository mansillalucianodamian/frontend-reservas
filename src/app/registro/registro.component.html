<div class="login-wrapper">
  <!-- Columna Izquierda: Imagen y Logo -->
  <div class="login-image-side">
    <img src="padel-playing.png" alt="Gente jugando al pádel" class="login-bg-img">
    <div class="login-image-overlay">
      <img src="Aldea-San-Antonio-White.png" alt="Logo Aldea San Antonio" class="login-logo">
      <div class="brand-colors-bar">
        <div class="color-red"></div>
        <div class="color-yellow"></div>
        <div class="color-green"></div>
      </div>
    </div>
  </div>

  <!-- Columna Derecha: Formulario de Registro -->
  <div class="login-form-side">
    <div class="login-box">
      <h2 class="content-title">Registrarse</h2>

      <div *ngIf="errorMessage" class="message message-error">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="message message-success">
        {{ successMessage }}
      </div>

      <form [formGroup]="registroForm" (ngSubmit)="onSubmit()" class="content-form">
        <!-- Input de Nombre -->
        <div class="input-group">
          <input formControlName="nombre" placeholder="Nombre" class="form-input" />
          <div *ngIf="registroForm.get('nombre')?.invalid && (registroForm.get('nombre')?.dirty || registroForm.get('nombre')?.touched)" class="error-msg">
            <small *ngIf="registroForm.get('nombre')?.errors?.['required']">El nombre es requerido</small>
          </div>
        </div>

        <!-- Input de Apellido -->
        <div class="input-group">
          <input formControlName="apellido" placeholder="Apellido" class="form-input" />
          <div *ngIf="registroForm.get('apellido')?.invalid && (registroForm.get('apellido')?.dirty || registroForm.get('apellido')?.touched)" class="error-msg">
            <small *ngIf="registroForm.get('apellido')?.errors?.['required']">El apellido es requerido</small>
          </div>
        </div>

        <!-- Input de DNI -->
        <div class="input-group">
          <input formControlName="dni" placeholder="DNI" class="form-input" />
          <div *ngIf="registroForm.get('dni')?.invalid && (registroForm.get('dni')?.dirty || registroForm.get('dni')?.touched)" class="error-msg">
            <small *ngIf="registroForm.get('dni')?.errors?.['required']">El DNI es requerido</small>
          </div>
        </div>

        <!-- Input de Teléfono -->
        <div class="input-group">
          <input formControlName="telefono" placeholder="Teléfono" class="form-input" />
          <div *ngIf="registroForm.get('telefono')?.invalid && (registroForm.get('telefono')?.dirty || registroForm.get('telefono')?.touched)" class="error-msg">
            <small *ngIf="registroForm.get('telefono')?.errors?.['required']">El teléfono es requerido</small>
          </div>
        </div>

        <!-- Input de Email -->
        <div class="input-group">
          <input formControlName="email" type="email" placeholder="Email" class="form-input" />
          <div *ngIf="registroForm.get('email')?.invalid && (registroForm.get('email')?.dirty || registroForm.get('email')?.touched)" class="error-msg">
            <small *ngIf="registroForm.get('email')?.errors?.['required']">El email es requerido</small>
            <small *ngIf="registroForm.get('email')?.errors?.['email']">Formato de email inválido</small>
          </div>
        </div>

        <!-- Input de Contraseña con Ojo Toggle -->
        <div class="input-group">
          <div class="password-container">
            <input [type]="mostrarContrasena ? 'text' : 'password'" formControlName="password" placeholder="Contraseña" class="form-input" />
            <button type="button" 
                    *ngIf="registroForm.get('password')?.value" 
                    (click)="toggleMostrarContrasena()" 
                    class="toggle-password-btn"
                    title="Mostrar/Ocultar contraseña">
              <!-- Ojo tachado (ocultar) -->
              <svg *ngIf="mostrarContrasena" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
              <!-- Ojo abierto (mostrar) -->
              <svg *ngIf="!mostrarContrasena" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div *ngIf="registroForm.get('password')?.invalid && (registroForm.get('password')?.dirty || registroForm.get('password')?.touched)" class="error-msg">
            <small *ngIf="registroForm.get('password')?.errors?.['required']">La contraseña es requerida</small>
          </div>
        </div>

        <!-- Botón de Envío -->
        <button type="submit" [disabled]="isLoading" class="button-login-submit">
          {{ isLoading ? 'Procesando...' : 'Registrarse' }}
        </button>

        <!-- Enlace para volver al Login -->
        <div class="register-link-container">
          <p class="register-text">
            ¿Ya tienes cuenta? <a (click)="goToLogin()" class="register-link">Iniciar Sesión</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
