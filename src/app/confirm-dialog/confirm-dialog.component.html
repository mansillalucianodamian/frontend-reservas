<div class="confirm-modal-wrapper" [ngClass]="data.tipo || 'info'">
  <!-- Cabecera con iconos dinámicos -->
  <div class="modal-header">
    <div class="modal-icon-container">
      <!-- Icono de Confirmación -->
      <svg *ngIf="data.tipo === 'confirm'" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
      </svg>
      
      <!-- Icono de Error o Bloqueo -->
      <svg *ngIf="data.tipo === 'error'" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      
      <!-- Icono de Success -->
      <svg *ngIf="data.tipo === 'success'" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </div>
    <h2 class="modal-title">{{ data.titulo }}</h2>
  </div>

  <div class="modal-body">
    <!-- Mensaje principal -->
    <p class="modal-message" *ngIf="data.mensaje">{{ data.mensaje }}</p>

    <!-- Lista de Reservas (Estilo filas individuales) -->
    <div class="modal-reservas-list" *ngIf="data.reservas && data.reservas.length > 0">
      <div *ngFor="let r of data.reservas" class="modal-reserva-row">
        <svg class="row-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span class="row-date">{{ r.fecha }}</span>
        <span class="row-separator">•</span>
        <span class="row-time">{{ r.hora }} hs</span>
      </div>
    </div>

    <!-- Mensaje de Resultado (Errores, límites o éxitos) -->
    <div *ngIf="data.resultado" class="modal-result-box">
      <span class="result-text">{{ data.resultado }}</span>
    </div>
  </div>

  <!-- Barra tricolor identitaria -->
  <div class="modal-brand-bar">
    <div class="color-red"></div>
    <div class="color-yellow"></div>
    <div class="color-green"></div>
  </div>

  <!-- Acciones -->
  <div class="modal-actions" *ngIf="!data.bloqueado && !data.resultado">
    <button class="btn-modal-cancel" (click)="onCancel()">Cancelar</button>
    <button class="btn-modal-confirm" (click)="onConfirm()">Confirmar</button>
  </div>

  <div class="modal-actions-single" *ngIf="data.bloqueado || data.resultado">
    <button class="btn-modal-close" (click)="onClose()">Entendido</button>
  </div>
</div>
