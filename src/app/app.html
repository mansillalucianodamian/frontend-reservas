<header class="navbar">
    <div class="navbar-left">
        <img src="/Aldea-San-Antonio.png" alt="Logo Aldea San Antonio" class="navbar-logo">
        <h2 class="navbar-title">Sistema de Reservas</h2>
    </div>

    <nav class="navbar-links" *ngIf="isLoggedIn$ | async">
        <!-- Saludo al usuario (Avatar circular + Nombre) -->
        <div class="user-greeting" [title]="userFirstName">
            <div class="user-avatar">{{ userInitials }}</div>
            <span class="user-welcome-text">Hola, <strong class="user-name">{{ userFirstName }}</strong></span>
        </div>

        <!-- Reservar Cancha (Pill link con ícono SVG de calendario) -->
        <a routerLink="/reservas" class="nav-btn-pill" title="Reservar cancha" aria-label="Reservar cancha">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
                <path d="M8 14h.01"></path>
                <path d="M12 14h.01"></path>
                <path d="M16 14h.01"></path>
                <path d="M8 18h.01"></path>
                <path d="M12 18h.01"></path>
                <path d="M16 18h.01"></path>
            </svg>
            <span class="nav-btn-text">Reservar Cancha</span>
        </a>

        <!-- Cerrar Sesión (Pill button con ícono SVG de logout) -->
        <button (click)="cerrarSesion()" class="nav-btn-pill btn-logout" title="Cerrar sesión" aria-label="Cerrar sesión">
            <svg class="nav-icon logout-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span class="nav-btn-text">Cerrar Sesión</span>
        </button>
    </nav>
</header>

<main class="main-content">
    <router-outlet></router-outlet>
</main>
