<div class="login-wrapper">
  <!-- Columna Izquierda: Imagen y Logo -->
  <div class="login-image-side">
    <img src="padel-playing.png" alt="Gente jugando al pádel" class="login-bg-img">
    <div class="login-image-overlay">
      <img src="Aldea-San-Antonio-White.png" alt="Logo Aldea San Antonio" class="login-logo">
      <div class="brand-colors-bar">
        <div class="color-red"></div>
        <div class="color-yellow"></div>
        <div class="color-green"></div>
      </div>
    </div>
  </div>

  <!-- Columna Derecha: Formulario de Recuperación -->
  <div class="login-form-side">
    <div class="login-box">
      <h2 class="content-title">Recuperar Contraseña</h2>

      <div *ngIf="errorMessage" class="message message-error">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="message message-success">
        {{ successMessage }}
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="content-form">
        <!-- Input de Email -->
        <div class="input-group">
          <input formControlName="email" type="email" placeholder="Usuario (Email)" class="form-input" />
          <div *ngIf="forgotForm.get('email')?.invalid && (forgotForm.get('email')?.dirty || forgotForm.get('email')?.touched)" class="error-msg">
            <small *ngIf="forgotForm.get('email')?.errors?.['required']">El email es requerido</small>
            <small *ngIf="forgotForm.get('email')?.errors?.['email']">Formato de email inválido</small>
          </div>
        </div>

        <!-- Botón de Envío -->
        <button type="submit" [disabled]="isLoading" class="button-login-submit">
          {{ isLoading ? 'Procesando...' : 'Enviar Enlace' }}
        </button>

        <!-- Enlace para volver al Login -->
        <div class="register-link-container">
          <p class="register-text">
            ¿Recordaste tu contraseña? <a (click)="goToLogin()" class="register-link">Iniciar Sesión</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
